<!DOCTYPE html>
<html lang="en" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSE Parts Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1E2124;
    --asphalt-2:#2A2E32;
    --steel:#5C6670;
    --steel-lt:#8B949C;
    --paper:#F3F1EA;
    --paper-dk:#E4E0D3;
    --yellow:#FFC72C;
    --yellow-dk:#8A5B00;
    --amber:#F2994A;
    --amber-dk:#7A3E0B;
    --green:#4C9A5B;
    --green-dk:#1F4D28;
    --red:#C0392B;
    --red-dk:#5C130B;
    --blue:#3E7CB1;
    --blue-dk:#173F5C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--asphalt);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 80px;}

  header.top{
    background:var(--asphalt);
    color:var(--paper);
    padding:22px 20px;
    border-radius:6px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    background-image:repeating-linear-gradient(135deg, rgba(255,199,44,0.06) 0px, rgba(255,199,44,0.06) 10px, transparent 10px, transparent 20px);
  }
  header.top h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    letter-spacing:0.5px;
    font-size:24px;
    margin:0;
    text-transform:uppercase;
  }
  header.top p{
    margin:4px 0 0;
    font-size:13px;
    color:var(--steel-lt);
    font-family:'IBM Plex Mono', monospace;
  }
  .stripe{
    display:flex;
    height:6px;
    border-radius:3px;
    overflow:hidden;
    width:120px;
  }
  .stripe span{flex:1;background:var(--yellow);}
  .stripe span:nth-child(even){background:var(--asphalt-2);}

  .toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:18px;
  }
  .toolbar input[type=text], .toolbar select{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    padding:9px 10px;
    border:1.5px solid var(--steel-lt);
    border-radius:5px;
    background:#fff;
    color:var(--asphalt);
  }
  .toolbar input[type=text]{flex:1;min-width:160px;}
  .btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:14px;
    padding:10px 16px;
    border-radius:5px;
    border:1.5px solid var(--asphalt);
    background:var(--asphalt);
    color:var(--paper);
    cursor:pointer;
  }
  .btn:hover{background:#000;}
  .btn.secondary{background:#fff;color:var(--asphalt);}
  .btn.secondary:hover{background:var(--paper-dk);}
  .btn.danger{background:var(--red);border-color:var(--red-dk);color:#fff;}
  .btn.yellow{background:var(--yellow);border-color:var(--yellow-dk);color:var(--yellow-dk);}

  .counts{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .count-card{
    background:#fff;
    border:1px solid var(--paper-dk);
    border-radius:6px;
    padding:10px 14px;
    min-width:90px;
  }
  .count-card .n{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;}
  .count-card .l{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:0.5px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px;
  }

  .tag{
    position:relative;
    background:#fff;
    border:1.5px solid var(--asphalt);
    border-radius:4px;
    padding:16px 14px 14px 30px;
    cursor:pointer;
    transition:transform .08s ease;
  }
  .tag:hover{transform:translateY(-2px);}
  .tag::before{
    content:"";
    position:absolute;
    left:12px;
    top:16px;
    bottom:16px;
    width:0;
    border-left:2px dashed var(--paper-dk);
  }
  .tag .hole{
    position:absolute;
    left:6px;
    top:16px;
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--paper);
    border:1.5px solid var(--steel-lt);
  }
  .tag .stamp{
    position:absolute;
    top:10px;
    right:10px;
    font-family:'Oswald', sans-serif;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.8px;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:3px;
    transform:rotate(3deg);
    border:1.5px solid currentColor;
  }
  .stamp.status-as-pulled{color:var(--steel);background:#F0EFEA;}
  .stamp.status-cleaning{color:var(--blue-dk);background:#E4EFF6;}
  .stamp.status-testing{color:var(--blue-dk);background:#E4EFF6;}
  .stamp.status-needs-repair{color:var(--red-dk);background:#FBEAE8;}
  .stamp.status-in-progress{color:var(--amber-dk);background:#FCEEE1;}
  .stamp.status-ready{color:var(--green-dk);background:#E7F3E9;}
  .stamp.status-ordered{color:var(--blue-dk);background:#E4EFF6;}
  .stamp.status-sold{color:var(--steel);background:#F0EFEA;}
  .stamp.status-scrapped{color:#fff;background:var(--asphalt);}

  .tag h3{
    font-family:'Oswald', sans-serif;
    font-size:17px;
    font-weight:600;
    margin:0 60px 2px 0;
    text-transform:uppercase;
  }
  .tag .sub{
    font-size:12.5px;
    color:var(--steel);
    margin-bottom:10px;
  }
  .tag .row{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    padding:3px 0;
    border-top:1px dotted var(--paper-dk);
  }
  .tag .row:first-of-type{border-top:none;}
  .tag .row .k{color:var(--steel);}
  .tag .row .v{font-family:'IBM Plex Mono', monospace;font-weight:500;text-align:right;}

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--steel);
    border:1.5px dashed var(--steel-lt);
    border-radius:8px;
    background:#fff;
  }
  .empty h2{font-family:'Oswald',sans-serif;text-transform:uppercase;color:var(--asphalt);}

  .overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(30,33,36,0.6);
    z-index:50;
    align-items:flex-start;
    justify-content:center;
    padding:24px 12px;
    overflow-y:auto;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--paper);
    border-radius:8px;
    max-width:640px;
    width:100%;
    padding:0;
    border:1.5px solid var(--asphalt);
  }
  .modal-head{
    background:var(--asphalt);
    color:var(--paper);
    padding:16px 20px;
    border-radius:6px 6px 0 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .modal-head h2{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    font-size:19px;
    margin:0;
  }
  .modal-head button{
    background:none;border:none;color:var(--paper);font-size:20px;cursor:pointer;line-height:1;
  }
  .modal-body{padding:18px 20px;}

  .section-label{
    font-family:'Oswald', sans-serif;
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--yellow-dk);
    margin:18px 0 8px;
    padding-bottom:5px;
    border-bottom:2px solid var(--yellow);
  }
  .section-label:first-child{margin-top:0;}

  .field-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.full{grid-column:1 / -1;}
  .field label{font-size:12px;color:var(--steel);font-weight:500;}
  .field input, .field select, .field textarea{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    padding:8px 9px;
    border:1.5px solid var(--steel-lt);
    border-radius:5px;
    background:#fff;
    color:var(--asphalt);
  }
  .field textarea{resize:vertical;min-height:60px;font-family:inherit;}

  .modal-actions{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:16px 20px 20px;
  }
  .modal-actions .left{display:flex;gap:8px;}

  .field-inline{display:flex;gap:6px;}
  .field-inline select{flex:1;}
  .btn-sm{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding:8px 10px;
    border-radius:5px;
    border:1.5px solid var(--steel-lt);
    background:#fff;
    color:var(--asphalt);
    cursor:pointer;
    white-space:nowrap;
  }
  .btn-sm:hover{background:var(--paper-dk);}
  .people-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:200px;overflow-y:auto;}
  .people-row{
    display:flex;justify-content:space-between;align-items:center;
    background:#fff;border:1px solid var(--paper-dk);border-radius:5px;
    padding:7px 10px;font-size:14px;
  }
  .people-row button{
    background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;font-weight:600;
  }
  .people-add{display:flex;gap:8px;}
  .people-add input{flex:1;}

  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
  .photo-thumb{
    position:relative;width:78px;height:78px;border-radius:5px;overflow:hidden;
    border:1.5px solid var(--steel-lt);background:var(--paper-dk);
  }
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .photo-thumb .rm{
    position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;
    background:var(--red);color:#fff;border:none;font-size:12px;line-height:18px;
    text-align:center;cursor:pointer;padding:0;
  }
  .photo-add-tile{
    width:78px;height:78px;border-radius:5px;border:1.5px dashed var(--steel-lt);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    color:var(--steel);font-size:11px;cursor:pointer;background:#fff;text-align:center;
  }
  .photo-add-tile:hover{background:var(--paper-dk);}
  .photo-hint{font-size:11.5px;color:var(--steel);margin:2px 0 10px;}

  @media (max-width:520px){
    .field-grid{grid-template-columns:1fr;}
    header.top{padding:18px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <h1>GSE Parts Tracker</h1>
      <p id="tagline">loading inventory...</p>
    </div>
    <div class="stripe"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </header>

  <div class="counts" id="counts"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search part name, number, unit, facility...">
    <select id="filterStatus"></select>
    <select id="filterCategory"></select>
    <button class="btn secondary" id="refreshBtn">Refresh</button>
    <button class="btn yellow" id="addBtn">+ Add part</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <h2>No parts logged yet</h2>
    <p>Tap "+ Add part" to log the first one off a unit.</p>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Add part</h2>
      <button id="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <form id="partForm">

        <div class="section-label">Part details</div>
        <div class="field-grid">
          <div class="field full">
            <label>Part name / description</label>
            <input type="text" id="partName" required placeholder="e.g. Hydraulic pump, drive belt, headlight assembly">
          </div>
          <div class="field">
            <label>Logged by</label>
            <div class="field-inline">
              <select id="loggedBy"></select>
              <button type="button" class="btn-sm" id="managePeopleBtn">People</button>
            </div>
          </div>
          <div class="field">
            <label>Part number (OEM/aftermarket)</label>
            <input type="text" id="partNumber">
          </div>
          <div class="field">
            <label>Category</label>
            <select id="category">
              <option>Engine / powertrain</option>
              <option>Hydraulic</option>
              <option>Electrical / wiring</option>
              <option>Tires & wheels</option>
              <option>Body / frame / sheet metal</option>
              <option>Lighting / safety</option>
              <option>Cab / interior</option>
              <option>Hoses / fittings</option>
              <option>Controls / switches</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Condition</label>
            <select id="condition">
              <option>New</option>
              <option>Used - good</option>
              <option>Used - fair</option>
              <option>Core</option>
              <option>Needs repair</option>
            </select>
          </div>
          <div class="field">
            <label>Quantity</label>
            <input type="number" id="quantity" min="0" value="1">
          </div>
          <div class="field">
            <label>Weight (lbs, optional)</label>
            <input type="text" id="weight">
          </div>
          <div class="field">
            <label>Bin / shelf / yard location</label>
            <input type="text" id="binLocation" placeholder="e.g. Rack 3, Bin B">
          </div>
        </div>

        <div class="section-label">Photos</div>
        <div class="photo-grid" id="photoGrid"></div>
        <div class="photo-hint">Add photos of the part, damage, or tag. Stored right on this part.</div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none;">

        <div class="section-label">Equipment it came off</div>
        <div class="field-grid">
          <div class="field">
            <label>Equipment type</label>
            <select id="equipmentType">
              <option>Pushback tug</option>
              <option>Baggage tractor</option>
              <option>Belt loader</option>
              <option>Ground power unit (GPU)</option>
              <option>Air start unit</option>
              <option>Lavatory service truck</option>
              <option>Water service truck</option>
              <option>Deicing truck</option>
              <option>Aircraft tow tractor</option>
              <option>Cargo / container loader</option>
              <option>Passenger stairs</option>
              <option>Fuel truck</option>
              <option>Air conditioning unit (ACU)</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Make</label>
            <input type="text" id="make">
          </div>
          <div class="field">
            <label>Model</label>
            <input type="text" id="model">
          </div>
          <div class="field">
            <label>Year</label>
            <input type="text" id="year">
          </div>
          <div class="field">
            <label>Unit / asset number</label>
            <input type="text" id="unitNumber">
          </div>
          <div class="field">
            <label>Serial number</label>
            <input type="text" id="serial">
          </div>
          <div class="field">
            <label>Power type</label>
            <select id="powerType">
              <option>Diesel</option>
              <option>Electric</option>
              <option>Propane / LP</option>
              <option>Gasoline</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Hour meter reading</label>
            <input type="text" id="hourMeter">
          </div>
        </div>

        <div class="section-label">Facility / source</div>
        <div class="field-grid">
          <div class="field">
            <label>Facility name</label>
            <input type="text" id="facilityName">
          </div>
          <div class="field">
            <label>Facility location</label>
            <input type="text" id="facilityLocation" placeholder="Airport code / city">
          </div>
          <div class="field">
            <label>Date acquired</label>
            <input type="date" id="dateAcquired">
          </div>
          <div class="field">
            <label>Acquisition method</label>
            <select id="acquisitionMethod">
              <option>Purchased</option>
              <option>Retired unit</option>
              <option>Salvage</option>
              <option>Trade</option>
              <option>Donor unit</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Acquisition cost ($)</label>
            <input type="text" id="cost">
          </div>
        </div>

        <div class="section-label">What needs to be done</div>
        <div class="field-grid">
          <div class="field">
            <label>Status</label>
            <select id="status">
              <option value="as-pulled">As-pulled</option>
              <option value="cleaning">Cleaning</option>
              <option value="testing">Testing</option>
              <option value="needs-repair">Needs repair</option>
              <option value="in-progress">In progress</option>
              <option value="ordered">Ordered</option>
              <option value="ready">Ready to sell</option>
              <option value="sold">Sold</option>
              <option value="scrapped">Scrapped</option>
            </select>
          </div>
          <div class="field">
            <label>Assigned to</label>
            <input type="text" id="assignedTo">
          </div>
          <div class="field">
            <label>Target completion date</label>
            <input type="date" id="targetDate">
          </div>
          <div class="field">
            <label>Asking price ($)</label>
            <input type="text" id="price">
          </div>
          <div class="field">
            <label>Order cost ($) &mdash; if ordered</label>
            <input type="text" id="orderCost">
          </div>
          <div class="field">
            <label>ETA &mdash; expected arrival date</label>
            <input type="date" id="eta">
          </div>
          <div class="field full">
            <label>Tasks needed (clean, test, repaint, replace seals, etc.)</label>
            <textarea id="tasks"></textarea>
          </div>
          <div class="field full">
            <label>Notes</label>
            <textarea id="notes"></textarea>
          </div>
        </div>

      </form>
    </div>
    <div class="modal-actions">
      <div class="left">
        <button class="btn danger" id="deleteBtn" style="display:none;">Delete</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn secondary" id="cancelBtn" type="button">Cancel</button>
        <button class="btn yellow" id="saveBtn" type="button">Save part</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="peopleOverlay">
  <div class="modal" style="max-width:380px;">
    <div class="modal-head">
      <h2>People who can log parts</h2>
      <button id="closePeopleModal">&times;</button>
    </div>
    <div class="modal-body">
      <div class="people-list" id="peopleList"></div>
      <div class="people-add">
        <input type="text" id="newPersonName" placeholder="Full name">
        <button class="btn secondary" id="addPersonBtn" type="button">Add</button>
      </div>
    </div>
    <div class="modal-actions">
      <div class="left"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn yellow" id="donePeopleBtn" type="button">Done</button>
      </div>
    </div>
  </div>
</div>

<script>
const STATUS_LABELS = {
  'as-pulled':'As-pulled','cleaning':'Cleaning','testing':'Testing',
  'needs-repair':'Needs repair','in-progress':'In progress','ordered':'Ordered',
  'ready':'Ready','sold':'Sold','scrapped':'Scrapped'
};

let parts = [];
let people = [];
let editingId = null;
let currentPhotos = [];

async function loadPeople(){
  try{
    const res = await window.storage.get('gse-people', true);
    people = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    people = [];
  }
  populatePeopleSelect();
  renderPeopleList();
}

async function savePeople(){
  try{
    await window.storage.set('gse-people', JSON.stringify(people), true);
  }catch(e){
    alert('Could not save people list. Try again.');
  }
}

function populatePeopleSelect(){
  const sel = document.getElementById('loggedBy');
  const current = sel.value;
  sel.innerHTML = '<option value="">Unassigned</option>' +
    people.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
  if(people.includes(current)) sel.value = current;
}

function renderPeopleList(){
  const list = document.getElementById('peopleList');
  if(people.length === 0){
    list.innerHTML = '<div style="font-size:13px;color:var(--steel);">No one added yet. Add the names of everyone allowed to log parts.</div>';
    return;
  }
  list.innerHTML = people.map((n,i)=>`
    <div class="people-row">
      <span>${escapeHtml(n)}</span>
      <button data-idx="${i}" class="removePerson">Remove</button>
    </div>
  `).join('');
  list.querySelectorAll('.removePerson').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const idx = parseInt(btn.getAttribute('data-idx'),10);
      people.splice(idx,1);
      await savePeople();
      populatePeopleSelect();
      renderPeopleList();
    });
  });
}

document.getElementById('managePeopleBtn').addEventListener('click', ()=>{
  document.getElementById('peopleOverlay').classList.add('open');
});
document.getElementById('closePeopleModal').addEventListener('click', ()=>{
  document.getElementById('peopleOverlay').classList.remove('open');
});
document.getElementById('donePeopleBtn').addEventListener('click', ()=>{
  document.getElementById('peopleOverlay').classList.remove('open');
});
document.getElementById('peopleOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='peopleOverlay') document.getElementById('peopleOverlay').classList.remove('open');
});
document.getElementById('addPersonBtn').addEventListener('click', async ()=>{
  const input = document.getElementById('newPersonName');
  const name = input.value.trim();
  if(!name) return;
  if(!people.includes(name)) people.push(name);
  input.value = '';
  await savePeople();
  populatePeopleSelect();
  renderPeopleList();
});
document.getElementById('newPersonName').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('addPersonBtn').click(); }
});

async function loadParts(){
  try{
    const res = await window.storage.get('gse-parts', true);
    parts = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    parts = [];
  }
  render();
}

async function saveParts(){
  try{
    await window.storage.set('gse-parts', JSON.stringify(parts), true);
  }catch(e){
    alert('Could not save. Try again.');
  }
}

function fmtMoney(v){
  if(!v && v !== 0) return '';
  const n = parseFloat(String(v).replace(/[^0-9.]/g,''));
  if(isNaN(n)) return v;
  return '$' + n.toLocaleString();
}

function populateFilters(){
  const statusSel = document.getElementById('filterStatus');
  const catSel = document.getElementById('filterCategory');
  statusSel.innerHTML = '<option value="">All statuses</option>' +
    Object.entries(STATUS_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  const cats = ['Engine / powertrain','Hydraulic','Electrical / wiring','Tires & wheels',
    'Body / frame / sheet metal','Lighting / safety','Cab / interior','Hoses / fittings',
    'Controls / switches','Other'];
  catSel.innerHTML = '<option value="">All categories</option>' +
    cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function render(){
  const search = document.getElementById('search').value.toLowerCase();
  const statusFilter = document.getElementById('filterStatus').value;
  const catFilter = document.getElementById('filterCategory').value;

  const filtered = parts.filter(p=>{
    if(statusFilter && p.status !== statusFilter) return false;
    if(catFilter && p.category !== catFilter) return false;
    if(search){
      const hay = [p.partName,p.partNumber,p.unitNumber,p.facilityName,p.make,p.model].join(' ').toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  }).sort((a,b)=> (b.dateAdded||'').localeCompare(a.dateAdded||''));

  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';

  if(parts.length === 0){
    empty.style.display = 'block';
    empty.querySelector('h2').textContent = 'No parts logged yet';
    empty.querySelector('p').textContent = 'Tap "+ Add part" to log the first one off a unit.';
  } else if(filtered.length === 0){
    empty.style.display = 'block';
    empty.querySelector('h2').textContent = 'No matches';
    empty.querySelector('p').textContent = 'Try clearing your search or filters.';
  } else {
    empty.style.display = 'none';
  }

  filtered.forEach(p=>{
    const card = document.createElement('div');
    card.className = 'tag';
    card.innerHTML = `
      <div class="hole"></div>
      <div class="stamp status-${p.status}">${STATUS_LABELS[p.status]||p.status}</div>
      <h3>${escapeHtml(p.partName||'Untitled part')}</h3>
      <div class="sub">${escapeHtml(p.category||'')}${p.partNumber ? ' &middot; #'+escapeHtml(p.partNumber) : ''}</div>
      <div class="row"><span class="k">Off unit</span><span class="v">${escapeHtml([p.year,p.make,p.model].filter(Boolean).join(' '))||'&mdash;'}</span></div>
      <div class="row"><span class="k">Unit #</span><span class="v">${escapeHtml(p.unitNumber||'—')}</span></div>
      <div class="row"><span class="k">Facility</span><span class="v">${escapeHtml(p.facilityName||'—')}</span></div>
      <div class="row"><span class="k">Qty / bin</span><span class="v">${escapeHtml(String(p.quantity||''))} &middot; ${escapeHtml(p.binLocation||'—')}</span></div>
      <div class="row"><span class="k">Logged by</span><span class="v">${escapeHtml(p.loggedBy||'Unassigned')}</span></div>
      ${p.photoCount ? `<div class="row"><span class="k">Photos</span><span class="v">${p.photoCount} attached</span></div>` : ''}
      ${p.status==='ordered' ? `<div class="row"><span class="k">Order cost</span><span class="v">${escapeHtml(fmtMoney(p.orderCost)||'—')}</span></div>
      <div class="row"><span class="k">ETA</span><span class="v">${escapeHtml(p.eta||'—')}</span></div>` : ''}
    `;
    card.addEventListener('click', ()=>openModal(p.id));
    grid.appendChild(card);
  });

  renderCounts();
}

function renderCounts(){
  const el = document.getElementById('counts');
  const total = parts.length;
  const ready = parts.filter(p=>p.status==='ready').length;
  const needsWork = parts.filter(p=>['needs-repair','in-progress','cleaning','testing','as-pulled'].includes(p.status)).length;
  const sold = parts.filter(p=>p.status==='sold').length;
  el.innerHTML = `
    <div class="count-card"><div class="n">${total}</div><div class="l">Total parts</div></div>
    <div class="count-card"><div class="n">${ready}</div><div class="l">Ready</div></div>
    <div class="count-card"><div class="n">${needsWork}</div><div class="l">In work</div></div>
    <div class="count-card"><div class="n">${sold}</div><div class="l">Sold</div></div>
  `;
  document.getElementById('tagline').textContent = `${total} part${total===1?'':'s'} logged`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 1000;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderPhotoGrid(){
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = currentPhotos.map((src,i)=>`
    <div class="photo-thumb">
      <img src="${src}" data-idx="${i}" class="photoView">
      <button class="rm" data-idx="${i}" type="button">&times;</button>
    </div>
  `).join('') + `<div class="photo-add-tile" id="photoAddTile">+<br>Add photo</div>`;

  grid.querySelectorAll('.rm').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentPhotos.splice(parseInt(btn.getAttribute('data-idx'),10),1);
      renderPhotoGrid();
    });
  });
  grid.querySelectorAll('.photoView').forEach(img=>{
    img.addEventListener('click', ()=>{
      const w = window.open('');
      if(w) w.document.write(`<img src="${img.src}" style="max-width:100%;">`);
    });
  });
  document.getElementById('photoAddTile').addEventListener('click', ()=>{
    document.getElementById('photoInput').click();
  });
}

document.getElementById('photoInput').addEventListener('change', async (e)=>{
  const files = Array.from(e.target.files || []);
  for(const f of files){
    try{
      const dataUrl = await compressImage(f);
      currentPhotos.push(dataUrl);
    }catch(err){}
  }
  e.target.value = '';
  renderPhotoGrid();
});

const fieldIds = ['partName','loggedBy','partNumber','category','condition','quantity','weight','binLocation',
  'equipmentType','make','model','year','unitNumber','serial','powerType','hourMeter',
  'facilityName','facilityLocation','dateAcquired','acquisitionMethod','cost',
  'status','assignedTo','targetDate','price','orderCost','eta','tasks','notes'];

async function openModal(id){
  editingId = id || null;
  const p = id ? parts.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = p ? 'Edit part' : 'Add part';
  document.getElementById('deleteBtn').style.display = p ? 'inline-block' : 'none';

  fieldIds.forEach(fid=>{
    const el = document.getElementById(fid);
    el.value = p ? (p[fid] || '') : (fid==='quantity' ? 1 : '');
  });

  currentPhotos = [];
  renderPhotoGrid();
  if(id){
    try{
      const res = await window.storage.get('part-photos:'+id, true);
      currentPhotos = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      currentPhotos = [];
    }
    renderPhotoGrid();
  }

  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

async function saveCurrent(){
  const name = document.getElementById('partName').value.trim();
  if(!name){
    alert('Enter a part name / description before saving.');
    return;
  }
  let record;
  if(editingId){
    record = parts.find(x=>x.id===editingId);
  } else {
    record = { id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), dateAdded: new Date().toISOString() };
    parts.push(record);
  }
  fieldIds.forEach(fid=>{
    record[fid] = document.getElementById(fid).value;
  });
  record.photoCount = currentPhotos.length;
  await saveParts();
  try{
    if(currentPhotos.length > 0){
      await window.storage.set('part-photos:'+record.id, JSON.stringify(currentPhotos), true);
    } else {
      await window.storage.delete('part-photos:'+record.id, true);
    }
  }catch(e){}
  closeModal();
  render();
}

async function deleteCurrent(){
  if(!editingId) return;
  if(!confirm('Delete this part? This cannot be undone.')) return;
  parts = parts.filter(x=>x.id!==editingId);
  await saveParts();
  try{ await window.storage.delete('part-photos:'+editingId, true); }catch(e){}
  closeModal();
  render();
}

document.getElementById('addBtn').addEventListener('click', ()=>openModal(null));
document.getElementById('refreshBtn').addEventListener('click', async ()=>{
  await loadPeople();
  await loadParts();
});
document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', saveCurrent);
document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
document.getElementById('search').addEventListener('input', render);
document.getElementById('filterStatus').addEventListener('change', render);
document.getElementById('filterCategory').addEventListener('change', render);

populateFilters();
loadPeople();
loadParts();
</script>
</body>
</html>
